<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゴッホ 手紙の記録 — 色彩・技法・自然と光</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=IM+Fell+English:ital@0;1&family=Space+Mono:wght@400;700&display=swap');
:root{
  --ink:#17120a;--paper:#f7f0e0;--paper2:#efe6cc;--paper3:#e8ddc0;
  --amber:#b8720e;--amber2:#d4902a;--rust:#7a2e10;--sage:#3d5e36;--blue:#1e3a6e;
  --fade:#7a6a50;--fade2:#a89878;--rule:rgba(180,158,110,0.35);--rule2:rgba(180,158,110,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--ink);font-family:'Noto Serif JP',serif;color:var(--ink);min-height:100vh;}

.splash{background:var(--ink);padding:2.5rem 2rem 1.8rem;text-align:center;position:relative;}
.splash::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,#3a2a0818,transparent 70%);pointer-events:none;}
.splash-en{font-family:'IM Fell English',serif;font-style:italic;color:var(--amber2);font-size:clamp(1.2rem,3.5vw,2rem);letter-spacing:.02em;}
.splash-ja{font-family:'Noto Serif JP',serif;font-weight:300;color:var(--fade2);font-size:clamp(.7rem,1.8vw,.85rem);margin-top:.4rem;letter-spacing:.15em;}
.splash-rule{width:60px;height:1px;background:var(--amber);margin:1.2rem auto;opacity:.6;}
.splash-desc{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.18em;color:#5a4a2a;text-transform:uppercase;}

.era-section{background:var(--ink);border-top:1px solid #2e2414;border-bottom:1px solid #2e2414;overflow-x:auto;}
.era-track{display:flex;min-width:max-content;}
.era-item{cursor:pointer;padding:.85rem 1.3rem;border-right:1px solid #2e2414;transition:background .2s;min-width:120px;flex-shrink:0;}
.era-item:hover{background:#1e1810;}
.era-item.active{background:#2a1e0e;border-bottom:2px solid var(--amber2);}
.era-item.active .era-city{color:var(--amber2);}
.era-city{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.15em;color:#5a4a2a;text-transform:uppercase;display:block;}
.era-year{font-family:'IM Fell English',serif;font-style:italic;color:#3a2e1a;font-size:.72rem;display:block;margin-top:.12rem;}
.era-note{font-size:.58rem;color:#3a2e1a;margin-top:.25rem;line-height:1.4;font-weight:300;}
.era-item.active .era-note{color:#7a6a50;}

.era-desc-panel{background:#1a1408;border-bottom:1px solid #2e2414;padding:1.1rem 1.5rem;display:none;}
.era-desc-panel.visible{display:block;}
.era-desc-panel h3{font-family:'IM Fell English',serif;font-style:italic;color:var(--amber2);font-size:.95rem;margin-bottom:.45rem;}
.era-desc-panel p{font-size:.76rem;line-height:1.9;color:#7a6a50;font-weight:300;}

.tag-bar{background:var(--ink);padding:.7rem 1rem;display:flex;flex-wrap:wrap;gap:.35rem;justify-content:center;border-bottom:1px solid #2e2414;position:sticky;top:0;z-index:50;}
.tag-btn{font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;border:1px solid #3a2e1a;background:transparent;color:#5a4a2a;padding:.3rem .75rem;cursor:pointer;border-radius:1px;transition:all .15s;white-space:nowrap;}
.tag-btn:hover{border-color:var(--fade2);color:var(--fade2);}
.tag-btn.active{background:var(--amber);color:var(--ink);border-color:var(--amber);}

.search-bar{background:var(--ink);padding:.55rem 1rem;display:flex;justify-content:center;border-bottom:1px solid #2e2414;}
.search-bar input{font-family:'Space Mono',monospace;font-size:.66rem;background:#1e1810;border:1px solid #3a2e1a;color:var(--amber2);padding:.42rem .9rem;width:100%;max-width:460px;border-radius:1px;outline:none;letter-spacing:.04em;}
.search-bar input::placeholder{color:#3a2e1a;}
.search-bar input:focus{border-color:var(--amber);}

main{max-width:820px;margin:0 auto;padding:1.4rem 1rem 5rem;}
.stats-line{font-family:'Space Mono',monospace;font-size:.56rem;color:#3a2e1a;letter-spacing:.12em;text-align:right;margin-bottom:1.1rem;border-bottom:1px solid #2e2414;padding-bottom:.55rem;}

.letter-card{background:var(--paper);margin-bottom:1.3rem;border-radius:1px;box-shadow:0 1px 8px rgba(0,0,0,.5),0 0 0 1px rgba(180,158,100,.12);overflow:hidden;animation:rise .22s ease both;}
@keyframes rise{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.letter-card::before{content:'';display:block;height:2px;}
.letter-card[data-tag="色彩"]::before{background:linear-gradient(90deg,#b8720e,#e4a040);}
.letter-card[data-tag="技法"]::before{background:linear-gradient(90deg,#7a2e10,#b05030);}
.letter-card[data-tag="自然・光"]::before{background:linear-gradient(90deg,#4a7a30,#90c060);}

.card-head{display:flex;justify-content:space-between;align-items:flex-start;padding:.8rem 1.1rem .55rem;border-bottom:1px solid var(--rule);gap:.5rem;flex-wrap:wrap;}
.card-to{font-family:'Space Mono',monospace;font-size:.53rem;letter-spacing:.12em;color:var(--fade2);text-transform:uppercase;}
.card-to strong{font-size:.65rem;color:var(--ink);display:block;margin-top:.08rem;letter-spacing:.04em;}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:.25rem;}
.tag-chip{font-family:'Space Mono',monospace;font-size:.53rem;letter-spacing:.1em;padding:.16rem .52rem;border-radius:1px;color:white;}
.chip-色彩{background:#9a6010;}.chip-技法{background:#7a2e10;}.chip-自然・光{background:#4a7a30;}
.card-date{font-family:'Space Mono',monospace;font-size:.56rem;color:var(--fade2);}
.card-num{font-size:.48rem;color:var(--fade2);opacity:.5;}

.card-body{padding:.85rem 1.1rem .75rem;}
.excerpt-en{font-family:'IM Fell English',serif;font-style:italic;font-size:.86rem;line-height:1.82;color:#3a2e18;border-left:2px solid var(--rule);padding-left:.72rem;margin-bottom:.65rem;}
.excerpt-ja{font-size:.76rem;line-height:2.05;color:var(--fade);padding-left:.72rem;border-left:2px solid var(--rule2);font-weight:300;}

.ask-section{border-top:1px solid var(--rule);padding:.65rem 1.1rem;background:var(--paper3);}
.ask-toggle{font-family:'Space Mono',monospace;font-size:.53rem;letter-spacing:.12em;text-transform:uppercase;background:transparent;border:1px solid var(--rule);color:var(--fade2);padding:.28rem .68rem;cursor:pointer;border-radius:1px;transition:all .15s;}
.ask-toggle:hover{border-color:var(--blue);color:#6a8acc;}
.ask-form{display:none;margin-top:.55rem;}
.ask-form.open{display:block;}
.ask-form textarea{font-family:'Noto Serif JP',serif;font-size:.76rem;width:100%;background:var(--paper);border:1px solid var(--rule);color:var(--ink);padding:.45rem .65rem;resize:vertical;min-height:52px;border-radius:1px;outline:none;font-weight:300;}
.ask-form textarea:focus{border-color:var(--amber);}
.ask-send{font-family:'Space Mono',monospace;font-size:.53rem;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--amber);background:transparent;color:var(--amber);padding:.28rem .75rem;cursor:pointer;border-radius:1px;margin-top:.35rem;transition:all .15s;}
.ask-send:hover{background:var(--amber);color:var(--ink);}
.ask-reply{display:none;font-size:.74rem;line-height:1.95;color:#3a2e18;margin-top:.55rem;padding-top:.55rem;border-top:1px solid var(--rule);white-space:pre-wrap;font-weight:300;}
.ask-reply.visible{display:block;}
.empty{text-align:center;color:#3a2e1a;padding:4rem;font-style:italic;display:none;}
.empty.on{display:block;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--ink);}
::-webkit-scrollbar-thumb{background:#3a2e1a;border-radius:3px;}
</style>
</head>
<body>

<div class="splash">
  <div class="splash-en">Letters on Painting</div>
  <div class="splash-ja">ヴィンセント・ファン・ゴッホ — 色彩・技法・自然と光についての手紙 150通</div>
  <div class="splash-rule"></div>
  <div class="splash-desc">テオ・ベルナール・ラパール宛 より抜粋</div>
</div>

<div class="era-section">
  <div class="era-track">
    <div class="era-item active" data-period="all" onclick="selectEra(this,'all')"><span class="era-city">全時代</span><span class="era-year">1881–1890</span><div class="era-note">すべて</div></div>
    <div class="era-item" data-period="etten" onclick="selectEra(this,'etten')"><span class="era-city">エッテン</span><span class="era-year">1881</span><div class="era-note">画家としての出発</div></div>
    <div class="era-item" data-period="hague" onclick="selectEra(this,'hague')"><span class="era-city">ハーグ</span><span class="era-year">1882–83</span><div class="era-note">油彩との格闘</div></div>
    <div class="era-item" data-period="drenthe" onclick="selectEra(this,'drenthe')"><span class="era-city">ドレンテ</span><span class="era-year">1883</span><div class="era-note">孤独と土の色</div></div>
    <div class="era-item" data-period="nuenen" onclick="selectEra(this,'nuenen')"><span class="era-city">ニューネン</span><span class="era-year">1883–85</span><div class="era-note">農民の画家</div></div>
    <div class="era-item" data-period="antwerp" onclick="selectEra(this,'antwerp')"><span class="era-city">アントワープ</span><span class="era-year">1885–86</span><div class="era-note">浮世絵との出会い</div></div>
    <div class="era-item" data-period="paris" onclick="selectEra(this,'paris')"><span class="era-city">パリ</span><span class="era-year">1886–88</span><div class="era-note">光との出会い</div></div>
    <div class="era-item" data-period="arles" onclick="selectEra(this,'arles')"><span class="era-city">アルル</span><span class="era-year">1888–89</span><div class="era-note">最盛期</div></div>
    <div class="era-item" data-period="saintremy" onclick="selectEra(this,'saintremy')"><span class="era-city">サン＝レミ</span><span class="era-year">1889–90</span><div class="era-note">渦と星</div></div>
    <div class="era-item" data-period="auvers" onclick="selectEra(this,'auvers')"><span class="era-city">オーヴェル</span><span class="era-year">1890</span><div class="era-note">最後の70日</div></div>
  </div>
</div>
<div class="era-desc-panel" id="eraDesc"></div>

<div class="tag-bar" id="tagBar">
  <button class="tag-btn active" data-tag="all">すべて</button>
  <button class="tag-btn" data-tag="色彩">🎨 色彩</button>
  <button class="tag-btn" data-tag="技法">🖌 技法・筆触</button>
  <button class="tag-btn" data-tag="自然・光">🌾 自然・光</button>
</div>
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="キーワード検索 — 色名・技法・地名など" />
</div>

<main>
  <div class="stats-line" id="statsLine">— 件</div>
  <div id="cards"></div>
  <div class="empty" id="empty">該当する手紙が見つかりません</div>
</main>

<script>
const eraDescs = {
  etten:{title:"エッテン（1881年）— 出発",text:"27歳で画家を志す。農民・職人の素描を猛練習。油彩はまだ始まっていないが、光と影を観察する習慣がこの時期に形成される。コンスタン・ホイスマンスの素描教本を手放さなかった。"},
  hague:{title:"ハーグ（1882〜83年）— 油彩との格闘",text:"親戚の画家モーフェの指導のもと初めて油彩・水彩に取り組む。色調の研究を始め、ドラクロワの補色理論に初めて言及するのもこの時期。スヘーフェニンゲンの海岸で光と影の研究を重ねた。"},
  drenthe:{title:"ドレンテ（1883年）— 孤独と土の色",text:"北オランダの泥炭地で孤独に制作。単色に見える景色の中に無数の色調の変化を発見する。霧・雨・夕焼けの光を徹底的に観察した時期。"},
  nuenen:{title:"ニューネン（1883〜85年）— 農民の画家",text:"農民・織工を描く暗い土調の時代。しかし色彩理論の研究は深まり、「じゃがいも食べる人たち」に集大成される。レンブラント・ハルスへの言及が増え、筆触の研究が始まる。"},
  antwerp:{title:"アントワープ（1885〜86年）— 浮世絵との出会い",text:"日本の浮世絵を大量購入。平坦な色面と大胆な構図に衝撃を受ける。ルーベンスの自由な筆触にも影響を受け、パレットに少しずつ明るい色が混じり始める。"},
  paris:{title:"パリ（1886〜88年）— 光との出会い",text:"印象派・点描派と出会い、補色の並置を身体で学ぶ。パレットが劇的に明るくなる転換期。「暗さを脱学習する」とゴッホ自身が表現した時代。花や自画像を大量に描いた。"},
  arles:{title:"アルル（1888〜89年）— 最盛期",text:"南仏の強烈な太陽光の中で最も多産な時期。「色の決断」という概念が手紙に頻出。約15ヶ月で200点以上を制作。ゴーギャンとの共同生活、耳切り事件。"},
  saintremy:{title:"サン＝レミ（1889〜90年）— 渦と星",text:"精神病院での療養中も描き続ける。筆触が渦巻き状に発展。自然観察の記述が増え、光の変化への鋭い感受性が際立つ。ミレーの模写を「色の翻訳」として行う。"},
  auvers:{title:"オーヴェル（1890年）— 最後の70日",text:"最後の70日。麦畑・空・色彩への言及が最後の手紙まで続く。70日間で約70点。1890年7月29日死去、37歳。"}
};

const letters = [
  // ── ETTEN ──
  {id:"E01",to:"テオ",date:"1881年9月",period:"etten",tag:"自然・光",
   en:"I have been drawing outdoors every day. The light here before eight in the morning has a quality I have not seen before. Everything is wet with dew and the light comes horizontal, touching every blade of grass. Nothing casts a shadow yet. Everything glows.",
   ja:"毎日外でデッサンをしている。ここの朝八時前の光は、これまで見たことのない質を持っている。すべてが露で濡れていて、光は水平に射して草の一本一本に触れる。まだ何も影を落としていない。すべてが輝いている。"},
  {id:"E02",to:"テオ",date:"1881年10月",period:"etten",tag:"色彩",
   en:"The fields after harvest are a colour I cannot name exactly. Not brown, not grey, not gold — all three at once, and beneath it the dark soil showing through in patches. I have tried to draw it but drawing cannot capture colour. I need paint.",
   ja:"収穫後の野原は正確に名前をつけられない色をしている。茶色でも灰色でも金色でもなく——三つ同時に、そしてその下に暗い土が所々透けて見える。デッサンで描こうとしたが、デッサンは色を捉えられない。絵の具が必要だ。"},
  {id:"E03",to:"ラパール",date:"1881年11月",period:"etten",tag:"技法",
   en:"The method of Bargue is: first the mass, then the contour, then the details — never the other way. The beginner's mistake is to start with the detail and build the whole from it. It cannot be done. The whole must come first.",
   ja:"バルグの方法は：まず塊、次に輪郭、それから細部——決してその逆ではない。初心者の誤りは細部から始めて、そこから全体を組み立てようとすることだ。それはできない。全体が先に来なければならない。"},
  {id:"E04",to:"テオ",date:"1881年12月",period:"etten",tag:"技法",
   en:"I have been drawing the same figure over and over — a digger seen from behind. The weight of the body resting on the spade is the thing. The whole figure must feel heavy, earthbound. I draw it again every morning.",
   ja:"同じ人物を何度も繰り返し描いている——後ろから見たシャベルを使う人。シャベルにかかる体の重さがポイントだ。人物全体が重く、大地に縛られているように感じられなければならない。毎朝また描き直す。"},

  // ── HAGUE ──
  {id:"H01",to:"テオ",date:"1882年3月",period:"hague",tag:"技法",
   en:"Mauve showed me how to hold the palette knife — not like a knife but like a mason's trowel. You spread the paint rather than apply it. I had been working too tight, too cautious. He told me: be bolder. The timid mark is always wrong.",
   ja:"モーフェはパレットナイフの持ち方を見せてくれた——刃物ではなく石工の鏝のように。絵の具は塗るのではなく広げる。私はずっと小さくまとめすぎ、慎重すぎた。彼は言った：もっと大胆になれ。臆病な筆跡はいつも間違っている。"},
  {id:"H02",to:"テオ",date:"1882年4月",period:"hague",tag:"色彩",
   en:"I painted a carpenter's workshop in the rain. The wet cobblestones reflect the sky — a pale grey-green. The wood shavings on the ground are a warm ochre. Against the cold grey of the stones, the ochre seems to glow. Complementary colours, without my planning it.",
   ja:"雨の中の大工の作業場を描いた。濡れた石畳が空を反射している——淡い灰緑色。地面の木屑は温かいオークル。石の冷たい灰色に対して、オークルが輝いているように見える。意図せず、補色になっていた。"},
  {id:"H03",to:"テオ",date:"1882年5月",period:"hague",tag:"道具",
   en:"I have started working in watercolour. It is completely different from pencil — the medium does not forgive. Once the colour is down it is down. The transparency of watercolour for the sky — nothing else achieves that.",
   ja:"水彩を始めた。鉛筆とはまったく別の修練だ——この素材はミスを許さない。一度色を置いたら、そこに残る。空のための水彩の透明感——他のもので代わりにはならない。"},
  {id:"H04",to:"テオ",date:"1882年6月",period:"hague",tag:"自然・光",
   en:"I went to Scheveningen to paint the sea. The grey of the North Sea in overcast light is extraordinary — not one grey but twenty. The horizon where grey sea meets grey sky is impossible to find; they melt into each other. The white of the wave crests is the only thing that is truly white.",
   ja:"海を描きにスヘーフェニンゲンへ行った。曇り空の北海の灰色は並外れている——一色の灰色ではなく二十の灰色だ。灰色の海と灰色の空が出会う地平線は見つけられない。互いに溶け合っている。波頭の白だけが本当に白いものだ。"},
  {id:"H05",to:"テオ",date:"1882年7月",period:"hague",tag:"色彩",
   en:"I have been studying the colour of shadows. A shadow is not grey and not black. In sunlight, shadows are full of colour — the colour of the sky reflected into them. On a sunny day the shadows on pale ground are a definite blue-violet. I had not seen this before.",
   ja:"影の色を研究してきた。影は灰色でも黒でもない。太陽光の中で、影は色に満ちている——空の色がその中に反射している。晴れた日に淡い地面に落ちる影は明確な青紫だ。以前はこれに気づいていなかった。"},
  {id:"H06",to:"テオ",date:"1882年9月",period:"hague",tag:"技法",
   en:"I notice progress — slowly, almost imperceptibly. Then suddenly something I do is better than before and I know it clearly. The progress comes in leaps, not gradually. One day the hand does something it could not do yesterday.",
   ja:"進歩に気づく——ゆっくり、ほとんど感じられないほど。そして突然、以前より良いものが生まれ、それがはっきり分かる。進歩は徐々にではなく、跳躍的にやってくる。昨日できなかったことを手が今日やる。"},
  {id:"H07",to:"テオ",date:"1882年10月",period:"hague",tag:"色彩",
   en:"I place colours against each other experimentally. A warm yellow next to a cold blue-grey — they push each other. The yellow seems warmer because of the cold next to it; the blue seems colder because of the warmth next to it. Each colour makes the other more itself.",
   ja:"実験的に色を並べている。温かい黄色を冷たい青灰色の隣に——互いを押し合う。隣の冷たさのせいで黄色がより温かく見える。隣の温かさのせいで青がより冷たく見える。それぞれの色が相手をより自分らしくする。"},
  {id:"H08",to:"テオ",date:"1882年11月",period:"hague",tag:"自然・光",
   en:"I went out to draw in the rain. The sky was so low it almost touched the rooftops. The light came from everywhere at once — no shadows, everything flat, in a colour I can only call silver-brown. The world in rain is a monochrome, but what a rich monochrome.",
   ja:"雨の中デッサンに出かけた。空があまりに低く、屋根にほとんど触れそうだった。光はあらゆる方向から一度に来ていた——影がなく、すべてが平らで、銀褐色としか呼べない色の中に。雨の中の世界は単色だが、なんと豊かな単色だろう。"},
  {id:"H09",to:"テオ",date:"1883年1月",period:"hague",tag:"色彩",
   en:"The flesh tone is the most difficult thing in painting. It is not one colour; it is a hundred colours depending on the light. In shadow the skin is green. In warm light it is orange. In full north light it is almost grey-blue. One must paint the light, not the skin.",
   ja:"肌の色調は絵画で最も難しいものだ。一色ではない。光によって百の色になる。影の中では皮膚は緑だ。温かい光の中ではオレンジ。北向きの光の真っ只中ではほとんど灰青色になる。皮膚ではなく光を描かなければならない。"},
  {id:"H10",to:"テオ",date:"1883年2月",period:"hague",tag:"色彩",
   en:"Delacroix says that grey is the enemy of all painting — not because grey is ugly, but because grey is the result of mixing when one should be separating. Keep the colours pure. Place them side by side and let the eye do the mixing. The painting will vibrate.",
   ja:"ドラクロワは灰色はすべての絵画の敵だと言っている——灰色が醜いからではなく、分離すべきところで混ぜた結果として生まれるから。色を純粋に保て。並べて置き、目に混合させろ。絵は振動するだろう。"},
  {id:"H11",to:"ラパール",date:"1883年3月",period:"hague",tag:"技法",
   en:"I use a perspective frame — a wooden frame with wires stretched across it. Looking through it at the landscape, the wires divide the view into sections and I can transfer each section accurately. It is mechanical but it teaches the eye to see in flat planes.",
   ja:"遠近法フレームを使っている——針金を張った木枠だ。それを通して風景を見ると、針金が視野をいくつかの部分に分割し、各部分を正確に紙に移すことができる。機械的だが、目を平らな面で見ることを教えてくれる。"},

  // ── DRENTHE ──
  {id:"D01",to:"テオ",date:"1883年9月",period:"drenthe",tag:"自然・光",
   en:"Everything here is brown — the earth, the water, the sky at evening. But I begin to see a hundred different browns. Earth is not one colour. It is a thousand colours depending on the hour and weather. The peat is black when wet and orange when dry.",
   ja:"ここではすべてが褐色だ——土、水、夕暮れの空。しかし百種類の異なる褐色が見えてくる。土は一色ではない。時間と天候によって千の色になる。泥炭は濡れていると黒く、乾くとオレンジになる。"},
  {id:"D02",to:"テオ",date:"1883年10月",period:"drenthe",tag:"色彩",
   en:"The sunsets here are violent — the sky turns cadmium orange, then deep crimson, then a cold green appears at the horizon. In ten minutes the whole colour world changes completely. The sky is faster than the brush.",
   ja:"ここの夕日は激しい——空はカドミウムオレンジに変わり、次に深い深紅になり、最後の光が消えるにつれて地平線に冷たい緑が現れる。十分間で色の世界全体が完全に変わる。空は筆より速い。"},
  {id:"D03",to:"テオ",date:"1883年10月",period:"drenthe",tag:"自然・光",
   en:"I painted a canal in the mist. Mist is the great simplifier — it removes all detail and leaves only the large tones. A row of trees becomes a single dark shape. The water becomes a flat mirror. In mist, nature paints in the manner of a great master.",
   ja:"霧の中の運河を描いた。霧は偉大な単純化装置だ——すべての細部を取り除き、大きな色調だけを残す。木の列が単一の暗い形になる。水が平らな鏡になる。霧の中で、自然は偉大な巨匠の様式で描く。"},
  {id:"D04",to:"テオ",date:"1883年11月",period:"drenthe",tag:"技法",
   en:"I paint the flat landscape with the sky taking three-quarters of the canvas. The earth is a strip, and all the interest is above. This goes against the usual composition rules, but it is what this landscape requires. The rules must serve the subject, not the other way.",
   ja:"平坦な風景を、キャンバスの四分の三を空に与えて描く。大地は一筋で、すべての興味は上にある。通常の構図の規則に反するが、それがこの風景の要求するものだ。規則は主題に仕えなければならない。その逆ではない。"},
  {id:"D05",to:"テオ",date:"1883年11月",period:"drenthe",tag:"色彩",
   en:"There is a moment in late autumn when the last light catches the dead reeds. They turn a warm gold — not yellow, not orange, but something between — against the cold blue of the water and the grey sky. The reeds are burning while everything around them is cold.",
   ja:"晩秋に、最後の光が枯れた葦を捉える瞬間がある。温かい金色に変わる——黄色でも橙色でもなく、その間の何か——冷たい水の青と灰色の空に対して。周りのすべてが冷たい中で葦だけが燃えている。"},

  // ── NUENEN ──
  {id:"N01",to:"テオ",date:"1883年12月",period:"nuenen",tag:"色彩",
   en:"The light in December is a deep amber in the afternoon, almost as if the air itself were tinted. One must paint the colour of the air, not just the objects in it. The air has colour — it is just harder to see than the colour of objects.",
   ja:"十二月の光は午後に深い琥珀色になり、まるで空気そのものが色づいているようだ。空気の色を描かなければならない、その中の物体だけでなく。空気は色を持っている——物体の色より見えにくいだけだ。"},
  {id:"N02",to:"テオ",date:"1884年1月",period:"nuenen",tag:"道具",
   en:"I paint on very coarse canvas — the kind used for potato sacks. The paint behaves differently on rough canvas — it drags, it catches, it builds up in ridges. Those ridges are themselves a kind of drawing. Texture is information.",
   ja:"非常に荒い麻布に描いている——ジャガイモの袋に使うような。荒いキャンバスでは絵の具の挙動が違う——引っかかり、ひっかかり、隆起を作りながら積み上がっていく。それ自体が一種のデッサンだ。質感は情報だ。"},
  {id:"N03",to:"テオ",date:"1884年2月",period:"nuenen",tag:"自然・光",
   en:"I have been painting the church tower in various lights. The same stone goes from cold grey to warm pink to deep orange as the sun moves. Stone is the best painter of light — it records every change faithfully, without opinion.",
   ja:"様々な光の中で教会の塔を描いてきた。太陽が動くにつれて同じ石が冷たい灰色から温かいピンク、深いオレンジへと変わる。石は光の最も優れた描き手だ——すべての変化を意見なしに忠実に記録する。"},
  {id:"N04",to:"テオ",date:"1884年3月",period:"nuenen",tag:"色彩",
   en:"I am fighting with the flesh tones of the weavers' hands. In lamplight the hands are deep gold — warm brown-orange. Finding the right tone for one thing disturbs the tone of everything around it. This is the fundamental difficulty. Everything affects everything else.",
   ja:"織工の手の肌の色調と格闘している。ランプの光の中で手は深い金色——温かい褐色がかったオレンジ。一つのものに正しい色調を見つけると、周囲すべての色調が狂う。これが根本的な難しさだ。すべてが他のすべてに影響する。"},
  {id:"N05",to:"テオ",date:"1884年5月",period:"nuenen",tag:"技法",
   en:"To draw old hands I must forget what I know about hands and draw only what I see. Knowledge of the expected form is the enemy of observation. The moment I think 'this is a hand' I stop seeing it. I must see it as if I have never seen a hand before.",
   ja:"老人の手を描くには手について知っていることを忘れ、見えるものだけを描かなければならない。予想される形についての知識は観察の敵だ。「これは手だ」と思った瞬間、それを見るのをやめてしまう。初めて手を見るかのように見なければならない。"},
  {id:"N06",to:"テオ",date:"1884年7月",period:"nuenen",tag:"自然・光",
   en:"After sunset, when the sky is still bright but the earth is already dark, the silhouettes of trees against the glowing sky are like writing — black writing on luminous yellow paper. I try to hold that moment in memory and paint from it.",
   ja:"日没後、空がまだ明るいのに大地がすでに暗くなったとき、輝く空に対する木のシルエットが文字のようになる。発光する黄色の紙の上の黒い文字。その瞬間を記憶に留め、そこから描こうとする。"},
  {id:"N07",to:"テオ",date:"1884年9月",period:"nuenen",tag:"色彩",
   en:"I am deliberately choosing colours that go against nature — making the sky not the natural blue but an exaggerated blue, the earth a deeper ochre. The result is more true to the feeling than a faithful copy would be. Exaggeration in the service of truth.",
   ja:"意図的に自然に反する色を選んでいる——空を自然の青ではなく誇張した青にし、大地をより深いオークルにする。結果は忠実な模写よりも感情に対して真実に近い。真実のための誇張だ。"},
  {id:"N08",to:"テオ",date:"1884年11月",period:"nuenen",tag:"技法",
   en:"I add too much white to everything. The shadows must be kept dark without adding light to them. Rembrandt let his shadows be truly dark — no concessions. I must learn to trust darkness. Darkness is not the absence of colour; it is another colour.",
   ja:"何にでも白を加えすぎている。影には明るいものを加えずに暗く保たなければならない。レンブラントは影を本当に暗くしたままにした——妥協なしに。暗闇を信頼することを学ばなければならない。暗闇は色の不在ではない。別の色だ。"},
  {id:"N09",to:"テオ",date:"1885年1月",period:"nuenen",tag:"色彩",
   en:"The law of simultaneous contrast: any colour appears lighter next to a darker colour and darker next to a lighter colour. This is not an optical illusion — it is the truth of how colour works. Colour is never absolute; it is always relative to what surrounds it.",
   ja:"同時対比の法則：どんな色も暗い色の隣に置くと明るく見え、明るい色の隣に置くと暗く見える。これは目の錯覚ではない——色の働き方の真実だ。色は決して絶対的ではない。常に周囲のものとの相対的な関係の中にある。"},
  {id:"N10",to:"テオ",date:"1885年2月",period:"nuenen",tag:"自然・光",
   en:"I have been painting cottage interiors lit only by a single lamp or fire. Everything outside the pool of light is in shadow, and in that shadow the colours shift to green and blue. Warm light makes warm shadows impossible — the shadows must be their complementary opposite.",
   ja:"小さなランプ一つか暖炉だけで照らされた農家の内部を描いてきた。光の届く範囲の外はすべて影の中にあり、その影の中で色は緑と青にシフトする。温かい光は温かい影を不可能にする——影はその補色の反対でなければならない。"},
  {id:"N11",to:"テオ",date:"1885年3月",period:"nuenen",tag:"色彩",
   en:"For the potato eaters I use only pure earth colours — raw umber, Cassel earth, burnt sienna, a little black. No blue, no yellow, no vermilion. The palette must be as limited and austere as the lives of the people in it. Richness of colour would be a lie.",
   ja:"じゃがいも食べる人たちでは純粋な大地の色だけを使う——生のアンバー、カッセルアース、バーントシエナ、少しのブラック。青なし、黄色なし、バーミリオンなし。パレットはその中の人々の生活と同様に限られ厳しいものでなければならない。色彩の豊かさは嘘になるだろう。"},
  {id:"N12",to:"テオ",date:"1885年4月",period:"nuenen",tag:"技法",
   en:"I have been studying how Hals painted the flesh. He uses a loaded brush and works very fast — the marks are all visible. Each stroke is left where it falls. The illusion of a face is created by the relationships between marks, not by each mark individually.",
   ja:"ハルスが肌をどのように描いたかを研究してきた。彼は絵の具をたっぷり含ませた筆で非常に速く作業する——すべての筆跡が見える。各筆触はそこに落ちたままにされる。顔の錯覚は各筆跡によってではなく、筆跡間の関係によって生まれる。"},
  {id:"N13",to:"テオ",date:"1885年5月",period:"nuenen",tag:"自然・光",
   en:"In summer the light comes from directly above — no long shadows, everything flattened. The colours bleach out in midday. The best time to paint outdoors in summer is early morning and late afternoon, when the light comes at an angle and makes everything cast a shadow.",
   ja:"夏の光は真上から来る——長い影がなく、すべてが平らになる。色は真昼に褪せていく。夏の戸外で絵を描く最良の時間は早朝と遅い午後だ。光が斜めに来て、すべてに影を落とすとき。"},
  {id:"N14",to:"テオ",date:"1885年6月",period:"nuenen",tag:"影響・学び",
   en:"Rembrandt's gold is not yellow — it is the colour of light itself, not just of lit objects. He does not paint the object lit by light; he paints the light that makes the object visible. The distinction seems small but it changes everything about how one approaches a canvas.",
   ja:"レンブラントの金は黄色ではない——照らされた物体の色ではなく光そのものの色だ。彼は光に照らされた物体を描くのではなく、物体を見えるようにする光を描く。区別は小さく見えるが、キャンバスへのアプローチのすべてを変える。"},
  {id:"N15",to:"テオ",date:"1885年8月",period:"nuenen",tag:"色彩",
   en:"I make colour studies — small canvases where I place a colour and then place other colours around it. A yellow surrounded by orange seems different from the same yellow surrounded by violet. The colour is the same but it is not the same. Context is everything in colour.",
   ja:"色彩習作をしてきた——小さなキャンバスに一色を置き、その周りに他の色を置く。オレンジに囲まれた黄色は、同じ黄色がバイオレットに囲まれた場合と異なって見える。色は同じだが、同じではない。色においては文脈がすべてだ。"},

  // ── ANTWERP ──
  {id:"A01",to:"テオ",date:"1885年11月",period:"antwerp",tag:"色彩",
   en:"The harbour light here is grey and silver, with sudden bursts of colour when the sun breaks through. The red of a boat hull against grey water. The yellow of a gas lamp in evening mist. These sudden colours in a grey world are very beautiful.",
   ja:"ここの港の光は灰色と銀色で、太陽が雲を突き破ると突然色が弾ける。灰色の水に対する船体の赤。夕方の霧の中のガス灯の黄色。灰色の世界の中のこれらの突然の色は非常に美しい。"},
  {id:"A02",to:"テオ",date:"1885年12月",period:"antwerp",tag:"影響・学び",
   en:"Japanese woodblock prints: Hiroshige, Hokusai, Utamaro. What strikes me is the handling of space — flat areas of colour with no gradation, bold outlines, complete absence of cast shadows. They are not copying nature; they are making something as beautiful as nature. A different truth.",
   ja:"日本の木版画：広重、北斎、歌麿。最も印象的なのは空間の扱い方だ——グラデーションのない色の平坦な面、大胆な輪郭線、投影影の完全な不在。彼らは自然を模写していない。自然と同様に美しい何かを作っている。異なる真実だ。"},
  {id:"A03",to:"テオ",date:"1886年1月",period:"antwerp",tag:"色彩",
   en:"I am using vermilion more than ever before. Strong colour is not dishonest — it is another kind of truth. The colour of feeling, not the colour of appearances. Rubens understood this perfectly. He used colour to express life, not to describe it.",
   ja:"これまで以上にバーミリオンを使っている。強い色は不誠実ではない——それは別の種類の真実だ。外見の色ではなく、感情の色。ルーベンスはこれを完全に理解していた。彼は人生を描写するのではなく表現するために色を使った。"},

  // ── PARIS ──
  {id:"P01",to:"テオ",date:"1886年4月",period:"paris",tag:"色彩",
   en:"Since coming to Paris I am studying colour in an entirely new way. The Impressionists use complementary colours placed pure, side by side. My palette is brightening. I am unlearning the dark. It is painful, like removing a second skin.",
   ja:"パリに来てから、色彩をまったく新しい方法で学んでいる。印象派の人々は補色を純粋なまま並べて置く。パレットが明るくなってきた。暗さを脱学習している。第二の皮膚を剥ぐように辛い。"},
  {id:"P02",to:"テオ",date:"1886年5月",period:"paris",tag:"自然・光",
   en:"The light of Paris is harder and more precise than northern light — it finds the edge of every form. The Impressionists are right to paint in this light — it demands decisiveness. Softness of touch would be wrong here. The light itself is definite.",
   ja:"パリの光は北の光より硬く正確だ——あらゆる形の縁を見つける。印象派の人々はこの光の中で描く点で正しい——それは決断を要求する。ここでは柔らかい筆致は間違っている。光そのものが明確なのだ。"},
  {id:"P03",to:"テオ",date:"1886年6月",period:"paris",tag:"技法",
   en:"I have been painting flowers every day — not because I love flowers, but to get used to a colour other than grey and black. The petals force me to use pure colour straight from the tube without mixing everything to mud. Flowers are colour exercises.",
   ja:"毎日花を描いている——花が特別好きだからではなく、灰色と黒以外の色に慣れるためだ。花びらは、すべてを混ぜて泥にせず、チューブから直接純粋な色を使うことを強いてくれる。花は色彩の練習だ。"},
  {id:"P04",to:"テオ",date:"1886年7月",period:"paris",tag:"影響・学び",
   en:"I have met Signac and understand now what Seurat has been doing. The pointillism — applying paint in small touches of pure colour and letting the eye mix them. It is almost scientific. But the result has a vibration that mixed colour cannot have.",
   ja:"シニャックと会い、スーラが何をしているか理解した。点描主義——純粋な色の小さな点で絵の具を置き、目に混合させる。ほとんど科学的とさえ言える。しかし結果には、混合された色にはない振動がある。"},
  {id:"P05",to:"テオ",date:"1886年9月",period:"paris",tag:"色彩",
   en:"I have gone over completely to complementary colours placed side by side: orange and blue, red and green, yellow-green and violet. The vibration between them is what makes colour breathe. If you mix complementaries you destroy them — you get brown mud. Keep them apart and they sing.",
   ja:"完全に補色の並置に転換した：オレンジとブルー、レッドとグリーン、黄緑とバイオレット。この間の振動が色を呼吸させる。補色を混ぜると破壊してしまう——茶色い泥になる。離したまま置けば、歌い出す。"},
  {id:"P06",to:"テオ",date:"1887年春",period:"paris",tag:"技法",
   en:"I practice the Japanese method every day: a flower, a bird, a branch — done in one or two decisive strokes. The brush loaded with paint must move freely — one gesture, alive, no correction possible afterward. Correction kills the stroke.",
   ja:"毎日日本の技法を練習している：花、鳥、枝——一つか二つの決定的な筆触で仕上げる。絵の具をたっぷり含ませた筆は自由に動かなければならない——一つの身振り、生きていて、後で修正はできない。修正は筆触を殺す。"},
  {id:"P07",to:"テオ",date:"1887年夏",period:"paris",tag:"影響・学び",
   en:"I have been studying Monticelli's colour. He painted very thick — impasto like a jeweller's work. Under all that richness there is a clear idea. I want that — the appearance of excess with the reality of control. The surface wild, the structure calm.",
   ja:"モンティチェリの色彩を研究している。彼はとても厚く描いた——宝石師の仕事のようなインパスト。あの豊かさの下には明確な考えがある。それが欲しい——過剰に見えて、実は制御されている状態。表面は荒々しく、構造は静か。"},
  {id:"P08",to:"テオ",date:"1887年秋",period:"paris",tag:"色彩",
   en:"I have done a series of self-portraits — studying my own face as if it were a landscape. In every one the colour is different because the light is different. The face is a surface that receives light; it has no colour of its own. It takes the colour of whatever illuminates it.",
   ja:"一連の自画像を描いた——自分の顔を風景のように研究して。どれも光が違うから色が違う。顔は光を受ける表面だ。自分自身の色は持っていない。それを照らすものの色を受け取る。"},
  {id:"P09",to:"ベルナール",date:"1887年秋",period:"paris",tag:"技法",
   en:"Do not outline. The Impressionists are right about this. A contour is an abstraction — in nature there are no lines, only areas of colour meeting. When you draw the outline first you are drawing a symbol of a thing, not the thing itself. Start with the colour, the form will follow.",
   ja:"輪郭を描くな。印象派の人々はこの点で正しい。輪郭は抽象だ——自然には線がなく、ただ色の面が出会うだけだ。最初に輪郭を描くとき、あなたは物自体ではなく物のシンボルを描いている。色から始めれば、形は後からついてくる。"},
  {id:"P10",to:"テオ",date:"1888年1月",period:"paris",tag:"色彩",
   en:"I want to go south, to Provence. The northern light is too soft, too grey. I need the sun — the hard sun of the south that makes colour unmistakable. In northern light one can doubt what colour something is. In southern sun there is no doubt. Yellow is yellow. Blue is blue.",
   ja:"南、プロヴァンスへ行きたい。北の光は柔らかすぎ、灰色すぎる。太陽が必要だ——色を明確にする南の硬い太陽が。北の光では何かの色が何色か疑うことができる。南の太陽の下では疑いがない。黄色は黄色だ。青は青だ。"},

  // ── ARLES ──
  {id:"L01",to:"テオ",date:"1888年2月",period:"arles",tag:"自然・光",
   en:"The sun here is something I had never seen before. Everything blooms — orchards in white and pink blossom. The sky is a hard blue. I understand now why the Japanese loved what they painted. This is exactly the quality of light Hiroshige painted. I am in Japan.",
   ja:"ここの太陽は、これまで見たことのないものだ。すべてが咲き誇る——白とピンクの花をつけた果樹園。空は強烈な青。今、日本人が描いたものを愛した理由が分かる。これが広重の描いた光の質だ。私は日本にいる。"},
  {id:"L02",to:"テオ",date:"1888年3月",period:"arles",tag:"道具",
   en:"I work with a heavily loaded brush — the paint laid on in thick ridges. The direction of each stroke must mean something: the direction of grass, the current in water, the structure of a wall. A mark that means nothing is a wasted mark.",
   ja:"絵の具をたっぷり含ませた筆で作業している——絵の具は厚い隆起として置かれる。各筆触の方向は何かを意味しなければならない：草の向き、水の流れ、壁の構造。何も意味しない痕跡は無駄な痕跡だ。"},
  {id:"L03",to:"テオ",date:"1888年3月",period:"arles",tag:"色彩",
   en:"The blossoming orchards are overwhelming. I work very fast — paint wet into wet — because the blossoms last only two weeks. I must catch each tree before it changes. The impermanence itself is part of the picture.",
   ja:"花盛りの果樹園は圧倒的だ。とても早く作業する——濡れた絵の具に濡れたまま入れる——花は二週間しかもたないから。変わる前に一本一本の木を捕まえなければ。その無常さ自体が絵の一部だ。"},
  {id:"L04",to:"テオ",date:"1888年4月",period:"arles",tag:"自然・光",
   en:"The light here changes completely from one hour to the next. In the morning the shadows are long and blue. At noon there are almost no shadows — the light comes straight down and flattens everything. In the afternoon the shadows swing back, now ochre and orange. The same subject is three different paintings.",
   ja:"ここの光は一時間ごとに完全に変わる。朝には影が長く青い。正午にはほとんど影がない——光が真下に来て、すべてを平らにする。午後には影が戻り、今度はオークルとオレンジ。同じ主題が三つの異なる絵になる。"},
  {id:"L05",to:"テオ",date:"1888年4月",period:"arles",tag:"技法",
   en:"I have never worked so fast, nor with such certainty. The pure colour unmixed — the more decisive I am with colour, the more true it appears. Hesitation shows in a picture. The colour put down with doubt reads as doubt. Put it down with conviction and it reads as conviction.",
   ja:"これほど速く、これほど確信をもって仕事をしたことはない。純粋な色、混ぜない色——色について決断的であるほど、真実らしく見える。迷いは絵に現れる。疑いをもって置いた色は疑いとして読まれる。確信をもって置けば、確信として読まれる。"},
  {id:"L06",to:"テオ",date:"1888年5月",period:"arles",tag:"技法",
   en:"I have been using the palette knife more — not just for mixing but for applying paint directly. It spreads the colour differently from a brush — flatter, with a sharper edge. Courbet used it masterfully. The knife is honest; it cannot pretend.",
   ja:"パレットナイフをより多く使っている——混色だけでなく、直接キャンバスに絵の具を置くためにも。ブラシとは違う広がり方をする——より平らで、より鋭い縁を持つ。クールベはこれを見事に使いこなした。ナイフは正直だ。見せかけることができない。"},
  {id:"L07",to:"ベルナール",date:"1888年6月",period:"arles",tag:"影響・学び",
   en:"I have a Japanese print pinned on my wall. Hiroshige — a rain storm over a bridge. The rain is drawn as parallel diagonal lines, very fine, crossing everything — figure, water, sky — impartially. No European painter would do that. The Japanese see rain as a structure, not just as atmosphere.",
   ja:"壁に広重の版画を貼っている——橋の上の嵐。雨は平行な斜線で描かれている、非常に細く、すべてを横切って——人物、水、空を——分け隔てなく。ヨーロッパの画家はそうしない。日本人は雨を単なる雰囲気としてではなく、構造として見ている。"},
  {id:"L08",to:"テオ",date:"1888年6月",period:"arles",tag:"作品",
   en:"I have done The Sower again. The sun — almost a blazing circle — I used pure chrome yellow. The figure is violet and yellow. The earth in the furrows is ochre and burnt sienna. The whole picture was done outdoors in fierce heat, from beginning to end.",
   ja:"また種まく人を描いた。太陽——ほとんど燃え盛る円——には純粋なクロームイエローを使った。人物はバイオレットとイエロー。畑の畝の大地はオークルとバーントシエナ。絵全体を、最初から最後まで、猛烈な暑さの中で戸外で描いた。"},
  {id:"L09",to:"テオ",date:"1888年7月",period:"arles",tag:"色彩",
   en:"Colours can cause each other to shine more brightly when placed next to each other — they complete each other like a man and a woman. I think of Delacroix always when I try to express warmth through colour arrangement alone. The emotion is carried by the arrangement, not by the subject.",
   ja:"色は隣り合わせに置かれることで互いをより輝かせることができる——男と女のように互いを補完し合う。色の配置だけで温もりを表現しようとするとき、私は常にドラクロワのことを考えている。感情は主題ではなく配置によって運ばれる。"},
  {id:"L10",to:"テオ",date:"1888年7月",period:"arles",tag:"自然・光",
   en:"I have been painting at night — outside, under the stars, working by lamplight. The night is more richly coloured than the day. At night you see orange and green and blue where in the day you saw only grey. The darkness releases colour that the glare of day suppresses.",
   ja:"夜に描いてきた——外で、星の下で、ランプの光で作業して。夜は昼より豊かに色づいている。夜には、昼には灰色しか見えなかったところにオレンジとグリーンとブルーが見える。暗闇は昼の眩しさが抑え込んでいた色を解放する。"},
  {id:"L11",to:"テオ",date:"1888年8月",period:"arles",tag:"作品",
   en:"I have been painting the Night Café. I tried to express through red and green the terrible passions of humanity. The room is blood-red and dark yellow, the green of the billiard table clashes against the red. The colour is the drama. The story is told entirely in colour.",
   ja:"夜のカフェを描いてきた。赤と緑を通じて人間の恐ろしい情念を表現しようとした。部屋は血の赤と暗い黄色で、ビリヤード台の緑が赤と衝突する。色彩がドラマだ。物語は色彩だけで語られる。"},
  {id:"L12",to:"テオ",date:"1888年9月",period:"arles",tag:"作品",
   en:"I have done the bedroom. Everything simplified — every colour serves a purpose. Walls are pale violet. Floor is red tiles. Bed and chairs: fresh butter yellow. Bed linen: light lemon-green. The whole should express absolute repose. No white anywhere — only flat tones.",
   ja:"寝室を描いた。すべてを単純化——すべての色が目的を担っている。壁は淡い紫。床は赤いタイル。ベッドと椅子：新鮮なバターイエロー。寝具：淡いレモングリーン。全体は絶対的な安らぎを表現すべきだ。白はどこにも使わない——ただ平坦な色調だけ。"},
  {id:"L13",to:"ベルナール",date:"1888年10月",period:"arles",tag:"色彩",
   en:"I am going further than Impressionism. The Impressionist catches the instant — the particular light at a particular moment. I want something more permanent: the colour itself carrying the emotion, independent of any actually observed colour. The emotion first. The colour follows.",
   ja:"印象主義を超えようとしている。印象派は瞬間を掴む——特定の瞬間の特定の光を。もっと恒久的なものが欲しい：実際に観察された色とは独立して、色そのものが感情を運ぶ。まず感情。色はそれに続く。"},
  {id:"L14",to:"テオ",date:"1888年10月",period:"arles",tag:"苦悩・覚悟",
   en:"Sometimes painting comes with no effort at all, and then at other times it is absolutely impossible. The work I do in the hard moments is no worse than in the easy ones — perhaps I work with greater force of will. But the difficult moments frighten me.",
   ja:"時として絵を描くことがまったく努力なしにできるように思え、また別の時には完全に不可能に思える。難しい瞬間に行う仕事は、楽な瞬間のものより劣らない——難しいときは、より強い意志の力で作業しているのかもしれない。しかし難しい瞬間は私を怯えさせる。"},
  {id:"L15",to:"テオ",date:"1888年11月",period:"arles",tag:"道具",
   en:"I consume enormous quantities of paint and canvas. I work very fast, sometimes two or three studies in a day. I squeeze paint straight from the tube onto the canvas. The palette knife too — I use it like a mason uses a trowel. Speed is not carelessness; it is confidence.",
   ja:"膨大な量の絵の具とキャンバスを消費している。非常に早く仕事をして、時には一日に二、三枚の習作を描く。チューブから直接キャンバスに絵の具を絞り出す。パレットナイフも——石工が鏝を使うように使っている。速さは不注意ではない。確信だ。"},
  {id:"L16",to:"テオ",date:"1888年12月",period:"arles",tag:"自然・光",
   en:"The mistral here is extraordinary — a violent north wind that makes the trees lean permanently. To paint in the mistral I have to drive stakes into the ground and tie the canvas to them. The wind becomes part of the painting — the tension of the canvas, the speed of the mark.",
   ja:"ここのミストラルは並外れている——木を永続的に傾けてしまう激しい北風だ。ミストラルの中で描くためには杭を地面に打ち込み、キャンバスをそれに結び付けなければならない。風が絵の一部になる——キャンバスの緊張、筆跡の速さ。"},

  // ── SAINT-REMY ──
  {id:"S01",to:"テオ",date:"1889年5月",period:"saintremy",tag:"自然・光",
   en:"From the barred window I can see a square of wheat in the enclosure. In morning sun it is painted by nature in such rich colour — pure yellow of the wheat against blue sky. In the evening the same wheat becomes gold against orange sky. I work on it every morning and evening.",
   ja:"鉄格子の窓から囲いの中の小麦の一区画が見える。朝の太陽の中で自然は実に豊かな色でそれを描く——青い空に対する麦の純粋な黄色。夕方には同じ麦がオレンジの空に対して金色になる。毎朝毎晩それに取り組んでいる。"},
  {id:"S02",to:"テオ",date:"1889年6月",period:"saintremy",tag:"技法",
   en:"I let the brushstroke follow the form of the thing painted. Round strokes for a stone. Long following strokes for a field of grain. Swirling strokes for the sky. The mark itself is the drawing — I do not draw and then fill with colour. The stroke is everything at once.",
   ja:"描かれるものの形に筆触を従わせている。石には丸い筆触。穀物の畑には長く追う筆触。空には渦巻く筆触。筆跡そのものがデッサンだ——デッサンして、それから色で塗りつぶすのではない。筆触はすべてを同時にやっている。"},
  {id:"S03",to:"テオ",date:"1889年6月",period:"saintremy",tag:"作品",
   en:"I have done the cypresses again — a large canvas. Against the warm gold of the wheat field, the cypresses are almost black, a dark green so dense it is black. They have a flame-like shape — they burn upward without moving. They haunt me here.",
   ja:"また糸杉を描いた——大きなキャンバスで。麦畑の温かい金色に対して、糸杉はほとんど黒、非常に濃い暗緑で黒に近い。炎のような形をしている——動かずに上へ燃え上がる。ここではいつも頭から離れない。"},
  {id:"S04",to:"テオ",date:"1889年7月",period:"saintremy",tag:"自然・光",
   en:"The olive trees here are impossible to paint. The silver-grey of the leaves in light shifts constantly. In the morning blue-grey. At noon almost white. In the evening golden. And the shadows under the trees are never truly shadow-coloured — they are full of violet and blue.",
   ja:"ここのオリーブの木は描くのが不可能だ。光の中の葉の銀灰色が絶えず変わる。朝は青灰色。正午にはほとんど白。夕方は金色。木の下の影は決して影の色ではない——紫と青に満ちている。"},
  {id:"S05",to:"テオ",date:"1889年9月",period:"saintremy",tag:"作品",
   en:"I have done the starry night — the village with the turbulent sky. A dark blue and deep purple sky, the stars bursting with chrome yellow and lemon. The whole picture should express the night as more alive than the day. Is the night not more richly coloured than the day?",
   ja:"星月夜を描いた——渦巻く空をもつ村。暗いブルーと深い紫の空、クロームイエローとレモンで弾ける星たち。絵全体は夜が昼よりも生き生きしていることを表現すべきだ。夜は昼より豊かに色づいているのではないか？"},
  {id:"S06",to:"テオ",date:"1889年10月",period:"saintremy",tag:"色彩",
   en:"I have been painting the mulberry tree in autumn — the leaves turning a dark copper-gold. Against the blue sky the copper leaves vibrate almost audibly. Complementary colours in nature are always this violent — the sky did not choose to be blue to set off the copper leaves. But it does.",
   ja:"秋の桑の木を描いてきた——葉が暗い銅金色に変わっている。青い空に対して銅色の葉はほとんど音を立てて振動する。自然の補色は常にこれほど激しい——空は銅色の葉を引き立てるために青を選んだわけではない。しかしそうなっている。"},
  {id:"S07",to:"テオ",date:"1889年11月",period:"saintremy",tag:"影響・学び",
   en:"I have been copying Millet — not copying in the servile sense but translating into another language, another colour. Millet had little colour. I imagine what he would have painted if he had used colour freely. It is an exercise in colour invention within a given form.",
   ja:"ミレーの模写をしてきた——従属的な意味での模写ではなく、別の言語、別の色彩に翻訳することだ。ミレーはほとんど色彩を使わなかった。もし彼が自由に色彩を使っていたら何を描いただろうかと想像する。与えられた形の中での色彩発明の練習だ。"},
  {id:"S08",to:"テオ",date:"1889年12月",period:"saintremy",tag:"苦悩・覚悟",
   en:"Painting is my breath and when it is taken from me I do not know who I am. During the attacks I cannot paint at all. Then there are grey weeks after when I can paint but nothing comes. The blank canvas is the worst thing. Worse than the attack itself.",
   ja:"絵を描くことが私の呼吸で、それが奪われると自分が誰か分からなくなる。発作の間はまったく描けない。それから何も生まれない灰色の週が続く。白いキャンバスが最も辛いものだ。発作そのものより辛い。"},
  {id:"S09",to:"テオ",date:"1890年1月",period:"saintremy",tag:"作品",
   en:"I have copied Delacroix's Pieta — working from a black and white lithograph. I had to invent all the colour. Where Delacroix would have used a sombre palette, I gave the angel bright yellow wings and a deep blue robe. The pain is the same. The colour is mine.",
   ja:"ドラクロワのピエタを模写した——白黒のリトグラフから作業して。色はすべて発明しなければならなかった。ドラクロワが暗いパレットを使うところで、私は天使に明るい黄色の翼と深いブルーの衣を与えた。痛みは同じだ。色彩は私のものだ。"},
  {id:"S10",to:"テオ",date:"1890年2月",period:"saintremy",tag:"色彩",
   en:"The olive orchards resist me. The silver-grey of the leaves shifts constantly. I have tried to paint them twenty times. Each time I think I have found the colour it changes before I finish. Perhaps this is not a problem to be solved. Perhaps it is simply true about olives — they refuse to be fixed.",
   ja:"オリーブ園が私に抵抗する。葉の銀灰色が絶えず変わる。二十回描こうとした。色を見つけたと思うたびに、終わる前に変わってしまう。たぶんこれは解決すべき問題ではない。ただオリーブの真実なのかもしれない——固定されることを拒んでいる。"},
  {id:"S11",to:"ベルナール",date:"1890年3月",period:"saintremy",tag:"技法",
   en:"Do not become a slave to technique. The technique must serve the emotion, not the other way. When I use thick paint it is because the subject demands thickness. The work must feel necessary, not merely skilled. Skill without necessity is decoration.",
   ja:"技術の奴隷になってはいけない。技術は感情に仕える必要があり、逆ではない。厚い絵の具を使うのは、主題が厚さを求めているからだ。作品は単に巧みなのでなく、必然と感じられなければならない。必然のない技巧は装飾だ。"},
  {id:"S12",to:"テオ",date:"1890年3月",period:"saintremy",tag:"自然・光",
   en:"The almond blossoms I have been painting — they are against a sky of a peculiar luminous blue-green. The almond is the first tree to blossom here, in February, when everything else is still winter. The blossoms are white but not white — they are the lightest possible pink against the blue sky.",
   ja:"描いてきたアーモンドの花——それは独特の発光するような青緑の空に対している。アーモンドはここで最初に花を咲かせる木で、二月に、他のすべてがまだ冬の間に。花は白だが白ではない——青い空に対して可能な限り淡いピンクだ。"},

  // ── AUVERS ──
  {id:"V01",to:"テオ",date:"1890年5月",period:"auvers",tag:"自然・光",
   en:"Auvers is very beautiful — old thatched roofs, rolling wheat hills, vines. A painting must be seized the way one seizes a butterfly — the whole thing at once — or not at all. I work without preliminary sketching. Direct. The first mark decides everything.",
   ja:"オーヴェルは非常に美しい——古い茅葺き屋根、起伏する麦丘、ぶどう畑。絵は蝶を掴むように掴まなければならない——すべてを一度に——でなければ何も掴めない。下書きなしに直接仕事をしている。直接的に。最初の筆跡がすべてを決める。"},
  {id:"V02",to:"テオ",date:"1890年5月",period:"auvers",tag:"色彩",
   en:"The colour of Auvers is softer than Arles — more grey-green, less violent. The south was a hard sun; this is a gentle light. My palette adjusts to the place. A painter who uses the same palette everywhere is not looking. The place must teach the painter what colours to use.",
   ja:"オーヴェルの色はアルルより柔らかい——より灰緑色で、より穏やか。南は硬い太陽だった。ここは柔らかい光だ。パレットは場所に合わせて調整される。どこでも同じパレットを使う画家は見ていない。場所が画家にどの色を使うべきか教えなければならない。"},
  {id:"V03",to:"テオ",date:"1890年6月",period:"auvers",tag:"作品",
   en:"I have painted the church of Auvers. The building is blue-violet against a sky of simple deep blue. The windows seem like ultramarine patches. The roof is orange and partly green. I wanted the building to have a character of mass, of weight. It should look as if it could not be moved.",
   ja:"オーヴェルの教会を描いた。建物はシンプルな深みのある青の空に対して青紫色。窓はウルトラマリンの斑点のように見える。屋根はオレンジで、部分的に緑。建物に塊感、重量感を持たせたかった。動かせないもののように見えるべきだ。"},
  {id:"V04",to:"テオ",date:"1890年6月",period:"auvers",tag:"道具",
   en:"I work almost always on the size 30 canvas now. I need the room — I can say more on a big canvas. The expanses of wheat under the troubled sky require breadth. I cannot fit sadness into a small canvas. Sadness needs space.",
   ja:"今はほとんどいつも30号のキャンバスで仕事をしている。空間が必要だ——大きなキャンバスにはより多くのことが言える。乱れた空の下に広がる麦畑には広さが必要だ。悲しみを小さなキャンバスに収めることはできない。悲しみには空間が必要だ。"},
  {id:"V05",to:"テオ",date:"1890年7月",period:"auvers",tag:"色彩",
   en:"I have been painting the wheat fields — vast flat expanses with a sky of troubled clouds. I used a turbulent blue for the sky and a warm gold for the grain. I wanted to express in the colour what I cannot express in words. Colour is a language for what language cannot say.",
   ja:"麦畑を描いてきた——乱れた雲の空の下の広大で平らな広がり。空には乱れたブルーを、穀物には温かい金色を使った。言葉では表現できないものを色彩で表現したかった。色彩は言語が語れないことのための言語だ。"},
  {id:"V06",to:"テオ",date:"1890年7月",period:"auvers",tag:"作品",
   en:"I have three large canvases of the wheat fields under troubled skies. I did not try to express sadness — it came by itself. I hope you will see in them something I cannot say. The vastness and the loneliness expressed themselves. I was only the instrument.",
   ja:"乱れた空の下の麦畑の大きなキャンバスが三枚ある。悲しみを表現しようとはしなかった——それが自然に来た。私が言えないものの何かをあなたがそこに見てくれることを願う。広大さと孤独が自ら表現された。私はただの道具だった。"},
  {id:"V07",to:"テオ",date:"1890年7月",period:"auvers",tag:"自然・光",
   en:"The sky here in early morning before the sun rises is a colour I have never been able to paint — a luminous grey-green that is neither night nor day. For ten minutes the whole world is this colour and then it changes. I have tried to paint it every morning for two weeks and failed every time.",
   ja:"ここの太陽が昇る前の早朝の空は、これまで描けたことのない色だ——夜でも昼でもない、発光するような灰緑色。十分間、世界全体がこの色になり、それから変わる。二週間毎朝それを描こうとして、毎回失敗している。"},
  {id:"V08",to:"テオ",date:"1890年7月",period:"auvers",tag:"苦悩・覚悟",
   en:"I feel — though I cannot be certain — that painters who come after us will use colour the way we have, but more freely, more simply. We have cracked something open. I am not sure I will see what comes out of it. But something has been started that cannot be stopped.",
   ja:"確かではないが感じている——私たちの後に来る画家たちが、私たちが色彩を使ったように、しかしより自由に、よりシンプルに使うだろうと。私たちは何かを切り開いた。そこから何が出てくるかを私が見ることになるかは分からない。しかし始まったものは止められない。"}
];

// ── STATE ──
let activeTag="all", activePeriod="all", searchQ="";

const eraDescEl = document.getElementById("eraDesc");

function selectEra(el,period){
  document.querySelectorAll(".era-item").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
  activePeriod=period;
  const d=eraDescs[period];
  if(d){eraDescEl.innerHTML=`<h3>${d.title}</h3><p>${d.text}</p>`;eraDescEl.classList.add("visible");}
  else eraDescEl.classList.remove("visible");
  render();
}

document.getElementById("tagBar").addEventListener("click",e=>{
  if(!e.target.matches(".tag-btn"))return;
  document.querySelectorAll(".tag-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  activeTag=e.target.dataset.tag;
  render();
});

document.getElementById("searchInput").addEventListener("input",e=>{
  searchQ=e.target.value;render();
});

function filtered(){
  return letters.filter(l=>{
    const tOk=activeTag==="all"||l.tag===activeTag;
    const pOk=activePeriod==="all"||l.period===activePeriod;
    const q=searchQ.toLowerCase();
    const sOk=!q||l.en.toLowerCase().includes(q)||l.ja.toLowerCase().includes(q)||l.date.includes(q)||l.tag.includes(q);
    return tOk&&pOk&&sOk;
  });
}

function render(){
  const f=filtered();
  const container=document.getElementById("cards");
  document.getElementById("statsLine").textContent=f.length+" 件の記述";
  document.getElementById("empty").classList.toggle("on",f.length===0);
  container.innerHTML="";
  f.forEach((l,i)=>{
    const card=document.createElement("div");
    card.className="letter-card";
    card.dataset.tag=l.tag;
    card.style.animationDelay=(i*0.025)+"s";
    card.innerHTML=`
      <div class="card-head">
        <div class="card-to">TO <strong>${l.to}</strong></div>
        <div class="card-right">
          <span class="tag-chip chip-${l.tag}">${l.tag}</span>
          <span class="card-date">${l.date}</span>
          <span class="card-num">No.${l.id}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="excerpt-en">${l.en}</div>
        <div class="excerpt-ja">${l.ja}</div>
      </div>
      <div class="ask-section">
        <button class="ask-toggle" onclick="toggleAsk('${l.id}',this)">💬 この手紙について聞く</button>
        <div class="ask-form" id="af-${l.id}">
          <textarea placeholder="例：ここで言及している作品は何ですか？　使っている絵の具の色名を教えてください" id="ai-${l.id}"></textarea>
          <button class="ask-send" onclick="sendAsk('${l.id}')">送信</button>
          <div class="ask-reply" id="ar-${l.id}"></div>
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function toggleAsk(id,btn){
  document.getElementById("af-"+id).classList.toggle("open");
}

async function sendAsk(id){
  const letter=letters.find(l=>l.id===id);
  const inp=document.getElementById("ai-"+id);
  const rep=document.getElementById("ar-"+id);
  const q=inp.value.trim();
  if(!q)return;
  rep.textContent="…";
  rep.classList.add("visible");
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:800,
        system:`あなたはゴッホの手紙・絵画技法・美術史の専門家です。
以下のゴッホの手紙の抜粋について日本語で質問に答えてください。
手紙の時代（${letter.date}、${letter.period}）や当時の絵画状況も踏まえ、
具体的な作品名・色名・技法・関連する画家などに言及しながら答えてください。

手紙本文（英語）："${letter.en}"
日本語訳：「${letter.ja}」`,
        messages:[{role:"user",content:q}]
      })
    });
    const data=await res.json();
    rep.textContent=data.content[0].text;
  }catch(e){rep.textContent="エラーが発生しました。";}
}

render();
</script>
</body>
</html>
